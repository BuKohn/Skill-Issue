{% load static %}
<html>
<head>
    <title>Skill Issue - Редактирование</title>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    {% include 'users/header.html' %}

    <div class="body-background">
        <a class="simple-text" style="margin-top: 20px; font-size: 1.5rem;" data-lang-ru="Измените своё объявление!" data-lang-en="Edit your announcement!">Измените своё объявление!</a>

        <form method="POST" action="{% url 'update_announcement' announcement.id %}" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="editor-container">
                <div class="profile-row-container" style="gap: 20px; flex-wrap: nowrap">
                    <div class="profile-column-container">
                        <div style="display: flex; justify-content: center; margin-top: 20px;">
                            <label for="image-upload" style="cursor: pointer;">
                                {% if announcement.image %}
                                    <img id="preview-image" class="image-element" src="{{ announcement.image.url }}" alt="Текущее изображение" style="object-fit: cover;">
                                {% else %}
                                    <img id="preview-image" class="image-element" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjE1IiBoZWlnaHQ9IjIxNSIgdmlld0JveD0iMCAwIDIxNSAyMTUiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxyZWN0IHdpZHRoPSIyMTUiIGhlaWdodD0iMjE1IiByeD0iNSIgZmlsbD0iI0ZGRkZGRiIgc3Ryb2tlPSIjNDI0MjQyIiBzdHJva2Utd2lkdGg9IjEiLz4KPHBhdGggZD0iTTEwNy41IDU1VjE2MCIgc3Ryb2tlPSIjNDI0MjQyIiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIvPgo8cGF0aCBkPSJNNjAgMTA3LjVIMTU1IiBzdHJva2U9IiM0MjQyNDIiIHN0cm9rZS13aWR0aD0iMiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIi8+Cjwvc3ZnPgo=" alt="Добавить изображение" style="object-fit: cover;">
                                {% endif %}
                            </label>
                            <input type="file" id="image-upload" name="image" class="file-input" accept="image/*">
                        </div>
                        <a class="simple-text" style="font-size: 1.2rem; margin: 0 auto;"
                           data-lang-ru="{% if announcement.image %}Изменить изображение{% else %}Выберите изображение{% endif %}"
                           data-lang-en="{% if announcement.image %}Change image{% else %}Choose image{% endif %}">
                            {% if announcement.image %}Изменить изображение{% else %}Выберите изображение{% endif %}
                        </a>
                    </div>

                    <div class="profile-column-container" style="width: 100%;">
                        <input type="text" class="guide_name_input" name="title" style="margin-left: 0"
                               placeholder="Введите название объявления"
                               data-placeholder-ru="Введите название объявления"
                               data-placeholder-en="Enter announcement title"
                               value="{{ announcement.title }}" required>
                        <textarea class="textarea" name="description" style="height: 180px; max-height: 180px; min-height: 180px; margin-bottom: 30px; width: 100%;"
                                  placeholder="Напишите описание..."
                                  data-placeholder-ru="Напишите описание..."
                                  data-placeholder-en="Write a description..." required>{{ announcement.description }}</textarea>
                    </div>
                </div>
            </div>

            <input type="text" name="tags" id="tags" class="guide_name_input" style="margin-bottom: 20px; text-align: center;"
                placeholder="теги через запятую"
                data-placeholder-ru="теги через запятую"
                data-placeholder-en="tags separated by commas"
                value="{{ tags_string }}">

            <div class="actions">
                <button type="button" class="profile-button" onclick="clearEditor()" data-lang-ru="Очистить" data-lang-en="Clear">Очистить</button>
                <button type="submit" class="profile-button" data-lang-ru="Сохранить изменения" data-lang-en="Save changes">Сохранить изменения</button>
                <button type="button"
                        id="delete-announcement-btn"
                        class="profile-button"
                        style="background-color:#ff5c5c; border:none;"
                        data-lang-ru="Удалить объявление"
                        data-lang-en="Delete announcement">
                    Удалить объявление
                </button>
            </div>
        </form>
    </div>

    {% include 'users/footer.html' %}

    <script>
        // Загрузка текущего изображения при открытии страницы
        document.addEventListener('DOMContentLoaded', function() {
            {% if announcement.image %}
                const currentImage = "{{ announcement.image.url }}";
                document.getElementById('preview-image').src = currentImage;
                document.getElementById('preview-image').style.objectFit = 'cover';
            {% endif %}
        });

        // Обработчик загрузки нового изображения
        document.getElementById('image-upload').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const previewImage = document.getElementById('preview-image');
                    previewImage.src = e.target.result;
                    previewImage.style.objectFit = 'cover';
                };
                reader.readAsDataURL(file);
            }
        });

        function clearEditor() {
            const lang = localStorage.getItem('lang') || 'RU';
            const confirmMsg = lang === 'RU' 
                ? 'Вы уверены, что хотите очистить все поля?' 
                : 'Are you sure you want to clear all fields?';
            if (confirm(confirmMsg)) {
                document.getElementById('preview-image').src = "data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjE1IiBoZWlnaHQ9IjIxNSIgdmlld0JveD0iMCAwIDIxNSAyMTUiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxyZWN0IHdpZHRoPSIyMTUiIGhlaWdodD0iMjE1IiByeD0iNSIgZmlsbD0iI0ZGRkZGRiIgc3Ryb2tlPSIjNDI0MjQyIiBzdHJva2Utd2lkdGg9IjEiLz4KPHBhdGggZD0iTTEwNy41IDU1VjE2MCIgc3Ryb2tlPSIjNDI0MjQyIiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIvPgo8cGF0aCBkPSJNNjAgMTA3LjVIMTU1IiBzdHJva2U9IiM0MjQyNDIiIHN0cm9rZS13aWR0aD0iMiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIi8+Cjwvc3ZnPgo=";
                document.getElementById('preview-image').style.objectFit = 'contain';
                document.getElementById('image-upload').value = '';
                document.getElementById('tags').value = '';
                document.querySelector('textarea[name="description"]').value = '';
                document.querySelector('input[name="title"]').value = '';
            }
        }

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }

        // Валидация формы перед отправкой
        document.querySelector('form').addEventListener('submit', function(event) {
            const title = document.querySelector('input[name="title"]').value.trim();
            const description = document.querySelector('textarea[name="description"]').value.trim();

            if (!title || !description) {
                const lang = localStorage.getItem('lang') || 'RU';
                const alertMsg = lang === 'RU'
                    ? 'Пожалуйста, заполните название и описание объявления'
                    : 'Please fill in the title and description';
                event.preventDefault();
                alert(alertMsg);
                return false;
            }
        });

        const deleteBtn = document.getElementById('delete-announcement-btn');
        if (deleteBtn) {
            deleteBtn.addEventListener('click', async () => {
                const lang = localStorage.getItem('lang') || 'RU';
                const confirmMsg = lang === 'RU'
                    ? 'Удалить это объявление? Действие необратимо.'
                    : 'Delete this announcement? This action cannot be undone.';
                if (!confirm(confirmMsg)) return;

                try {
                    const res = await fetch(`/api/announcements/{{ announcement.id }}/`, {
                        method: 'DELETE',
                        headers: { 'X-CSRFToken': getCookie('csrftoken') || '' },
                        credentials: 'same-origin'
                    });

                    if (!res.ok) {
                        throw new Error(lang === 'RU' ? 'Не удалось удалить объявление' : 'Failed to delete announcement');
                    }

                    window.location.href = "{% url 'announcements_list' %}";
                } catch (err) {
                    alert(err.message || (lang === 'RU' ? 'Ошибка при удалении' : 'Error deleting'));
                }
            });
        }
    </script>
    <script src="{% static 'js/search.js' %}"></script>
    <script src="{% static 'js/toggle_language.js' %}"></script>
    <script src="{% static 'js/theme.js' %}"></script>
</body>
</html>
